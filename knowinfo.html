<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiSearch - Instant Wikipedia Search</title>
    <meta name="description" content="Fastest way to search Wikipedia. Type anything and instantly open the exact page.">
    <meta name="keywords" content="wikipedia search, wiki search, quick wikipedia, wikipedia lookup">
    <link rel="canonical" href="https://YOURUSERNAME.github.io/wiki-search">
    <style>
        :root{--primary:#667eea;--secondary:#764ba2;--accent:#f093fb;--success:#10b981;--error:#ef4444}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,var(--primary)0%,var(--secondary)100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);padding:60px 40px;border-radius:24px;box-shadow:0 25px 80px rgba(0,0,0,.25);max-width:550px;width:100%;text-align:center;border:1px solid rgba(255,255,255,.2)}
        h1{background:linear-gradient(45deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:3em;margin-bottom:15px;font-weight:800}
        .subtitle{color:#64748b;font-size:1.2em;margin-bottom:40px;font-weight:500}
        .search-box{position:relative;margin-bottom:30px}
        input{width:100%;padding:22px 70px 22px 30px;font-size:20px;border:3px solid #e2e8f0;border-radius:50px;outline:none;transition:all .4s;box-shadow:0 10px 30px rgba(0,0,0,.1);background:#fff}
        input:focus{border-color:var(--primary);box-shadow:0 20px 50px rgba(102,126,234,.3);transform:translateY(-3px)}
        .search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--primary);color:#fff;border:none;width:60px;height:60px;border-radius:50%;cursor:pointer;font-size:24px;box-shadow:0 8px 25px rgba(102,126,234,.4);transition:all .3s}
        .search-btn:hover{background:#5a67d8;transform:translateY(-50%) scale(1.05);box-shadow:0 12px 35px rgba(102,126,234,.5)}
        .random-btn{background:linear-gradient(45deg,var(--accent),#f5576c);color:#fff;border:none;padding:18px 40px;border-radius:50px;cursor:pointer;font-size:18px;font-weight:700;margin-top:25px;transition:all .3s;box-shadow:0 10px 30px rgba(240,147,251,.4)}
        .random-btn:hover{transform:translateY(-4px);box-shadow:0 20px 50px rgba(240,147,251,.6)}
        .status{margin-top:25px;padding:15px 25px;border-radius:12px;font-weight:600;font-size:16px;display:none;backdrop-filter:blur(10px)}
        .status.success{background:rgba(16,185,129,.2);color:var(--success);border:1px solid rgba(16,185,129,.3)}
        .status.error{background:rgba(239,68,68,.2);color:var(--error);border:1px solid rgba(239,68,68,.3)}
        .examples{margin-top:30px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
        .example{background:rgba(255,255,255,.3);padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer;transition:all .3s;border:1px solid rgba(255,255,255,.2)}
        .example:hover{background:rgba(102,126,234,.3);transform:scale(1.05)}
        @media (max-width:600px){.container{padding:40px 25px;margin:10px}h1{font-size:2.2em}}
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 WikiSearch</h1>
        <p class="subtitle">Type → Enter → Wikipedia Opens Instantly!</p>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Einstein, Python, Black Hole, iPhone..." />
            <button class="search-btn" onclick="goToWiki()">➤</button>
        </div>
        <button class="random-btn" onclick="randomWiki()">🎲 Random Article</button>
        <div id="status" class="status"></div>
        <div class="examples">
            <div class="example" onclick="quickSearch('Albert Einstein')">Einstein</div>
            <div class="example" onclick="quickSearch('Python programming')">Python</div>
            <div class="example" onclick="quickSearch('iPhone')">iPhone</div>
            <div class="example" onclick="quickSearch('SpaceX')">SpaceX</div>
        </div>
    </div>
    <script>
        const searchInput=document.getElementById('searchInput'),statusDiv=document.getElementById('status');
        searchInput.focus(),searchInput.addEventListener('keypress',e=>'Enter'===e.key&&goToWiki());
        function goToWiki(){const e=searchInput.value.trim();e?(window.open(`https://en.wikipedia.org/w/index.php?search=${encodeURIComponent(e)}`,'_blank'),showStatus(`✅ Opened "${e}"`,'success'),searchInput.value=''):showStatus('Enter search term!','error')}
        async function randomWiki(){showStatus('🎲 Fetching...','success');try{const e=await fetch('https://en.wikipedia.org/w/api.php?action=query&format=json&list=random&rnnamespace=0&rnlimit=1&origin=*'),t=await e.json(),n=t.query.random[0].title;window.open(`https://en.wikipedia.org/wiki/${encodeURIComponent(n)}`,'_blank'),showStatus(`🎉 ${n}`,'success')}catch{window.open('https://en.wikipedia.org/wiki/Special:Random','_blank'),showStatus('✅ Random opened!','success')}}
        function quickSearch(e){searchInput.value=e,goToWiki()}
        function showStatus(e,t){statusDiv.textContent=e,statusDiv.className=`status ${t}`,statusDiv.style.display='block',setTimeout(()=>statusDiv.style.display='none',4e3)}
    </script>
</body>
</html>
